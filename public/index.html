<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>翻译协作工作台</title>
<style>
:root{--bg:#f4f6f8;--surface:#fff;--line:#d8dde5;--text:#172033;--muted:#667085;--brand:#315efb;--brand2:#244bd6;--ok:#16803c;--warn:#d98200;--bad:#d92d20;--kr:#f7f8fa;--edit:#eef4ff;--review:#fff9df;--final:#f5f1ff;--active:#fff3bf}
*{box-sizing:border-box}body{margin:0;height:100vh;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif}button,input{font:inherit}
.topbar{display:flex;gap:10px;align-items:center;padding:10px 14px;background:var(--surface);border-bottom:1px solid var(--line);flex-wrap:wrap}.logo{font-weight:800;color:var(--brand);white-space:nowrap}.name{width:130px;border:1px solid var(--line);border-radius:6px;padding:7px 9px}.btn{border:0;border-radius:6px;background:var(--brand);color:#fff;padding:8px 12px;cursor:pointer;white-space:nowrap}.btn:hover{background:var(--brand2)}.btn.sec{background:#eef0f4;color:#253044}.btn.sec:hover{background:#dde2ea}.btn:disabled{opacity:.55;cursor:not-allowed}.conn{margin-left:auto;display:flex;align-items:center;gap:10px;padding:7px 10px;border:1px solid var(--line);border-radius:8px;background:#fafbfc;font-size:13px}.dot{width:9px;height:9px;border-radius:50%;background:#98a2b3}.dot.ok{background:var(--ok)}.dot.warn{background:var(--warn)}.dot.bad{background:var(--bad)}.mode{font-weight:700}.small{font-size:12px;color:var(--muted)}
.screen{flex:1;min-height:0;overflow:hidden}.hidden{display:none!important}
.library{height:100%;display:flex;flex-direction:column}.library-head{display:flex;align-items:flex-start;gap:12px;padding:14px 22px;border-bottom:1px solid var(--line);background:var(--surface);flex-wrap:wrap}.library-title{font-size:20px;font-weight:800}.library-sub{color:var(--muted);font-size:13px}.library-actions{order:-1;width:100%;display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-start}.crumbs{width:100%;font-size:13px;color:var(--muted)}.file-list{flex:1;overflow:auto;padding:18px 22px}.file-table{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--line);border-radius:8px;overflow:hidden}.file-table th{background:#f8fafc;color:var(--muted);font-size:12px;text-align:left;padding:10px;border-bottom:1px solid var(--line)}.file-table td{padding:12px 10px;border-bottom:1px solid #edf0f5}.file-row{cursor:pointer}.file-row:hover{background:#f5f8ff}.file-row.dragging{opacity:.45}.file-row.drop-target{outline:2px solid var(--brand);outline-offset:-2px;background:#eaf0ff}.file-name{font-weight:700;color:#1d2939}.folder-name{font-weight:800;color:#344054}.empty{height:100%;display:flex;align-items:center;justify-content:center;text-align:center;color:#98a2b3;line-height:1.8;padding:30px}.ctx{position:fixed;z-index:1000;background:#fff;border:1px solid var(--line);border-radius:8px;box-shadow:0 12px 30px rgba(16,24,40,.18);padding:6px;min-width:150px}.ctx button{display:block;width:100%;border:0;background:#fff;text-align:left;padding:8px 10px;border-radius:5px;cursor:pointer}.ctx button:hover{background:#f2f4f7}.ctx .danger{color:var(--bad)}
.chapters{display:flex;gap:4px;align-items:center;min-height:38px;padding:0 14px;background:var(--surface);border-bottom:1px solid var(--line);overflow-x:auto}.tab{border:0;background:transparent;border-bottom:2px solid transparent;padding:9px 14px;color:var(--muted);cursor:pointer;white-space:nowrap}.tab:hover{background:#f1f3f7;color:var(--text)}.tab.active{color:var(--brand);border-bottom-color:var(--brand);font-weight:700}.chapter-info{margin-left:auto;white-space:nowrap}
.main{height:calc(100% - 38px);display:flex;min-height:0}.left{flex:1.55;min-width:0;background:var(--surface);display:flex;flex-direction:column;border-right:1px solid var(--line)}.right{flex:1;min-width:320px;background:#fffdfa;display:flex;flex-direction:column}.tools{display:flex;gap:8px;align-items:center;padding:7px 10px;border-bottom:1px solid var(--line)}.tools input{flex:1;border:1px solid var(--line);border-radius:6px;padding:7px 9px}
.table-wrap{flex:1;overflow:auto}table{width:100%;border-collapse:collapse;table-layout:fixed;font-size:13px}th{position:sticky;top:0;z-index:2;background:#f8fafc;color:var(--muted);border-bottom:2px solid var(--line);padding:7px 5px;text-align:left;font-size:12px}td{border:1px solid #e7eaf0;padding:5px;vertical-align:top;line-height:1.55;white-space:pre-wrap;word-break:break-word}.w-merge{width:38px;text-align:center}.w-seq{width:54px;text-align:center}.kr{background:var(--kr);color:#555;font-family:"Malgun Gothic","Apple SD Gothic Neo","Noto Sans KR",sans-serif}.editable{background:var(--edit);outline:none;cursor:text}.editable.review{background:var(--review)}.editable:focus{box-shadow:inset 0 0 0 2px var(--brand);background:#fffde7}.cell-active{box-shadow:inset 0 0 0 2px var(--brand)!important}.merged-cell{background:#f6f8fb;color:#475467}.merged-note{display:inline-block;margin-top:5px;padding:2px 6px;border-radius:999px;background:#eef0f4;color:#667085;font-size:11px}.final{background:var(--final);color:#3f2da8;font-weight:600}.row-active td{background:var(--active)!important}
.preview-head{display:flex;justify-content:space-between;gap:10px;align-items:center;padding:10px 14px;border-bottom:1px solid var(--line);font-size:13px;color:var(--muted)}.preview-actions{display:flex;gap:6px}.mini{border:1px solid var(--line);border-radius:5px;background:#fff;color:var(--muted);padding:4px 8px;cursor:pointer}.mini:hover{background:#f1f3f7}.preview{flex:1;overflow:auto;padding:14px 18px}.para{display:flex;gap:7px;margin:0 0 8px;padding:6px 8px;border-radius:6px;line-height:1.85;cursor:pointer;font-family:"Noto Serif SC","Source Han Serif SC",SimSun,serif}.para:hover,.para.active{background:#eaf0ff}.para.active{box-shadow:-3px 0 0 #f0c040}.pnum{width:38px;flex:none;color:#98a2b3;font:12px system-ui}.ptext{flex:1;white-space:pre-wrap}.pa{display:flex;flex-direction:column;gap:3px;opacity:0}.para:hover .pa{opacity:1}.pa button{width:28px;height:26px;border:1px solid var(--line);border-radius:5px;background:#fff;cursor:pointer}
.statusbar{display:flex;gap:18px;align-items:center;padding:6px 14px;border-top:1px solid var(--line);background:var(--surface);font-size:12px;color:var(--muted)}.save-dot{width:8px;height:8px;border-radius:50%;display:inline-block;background:var(--ok)}.save-dot.dirty{background:var(--bad)}.save-dot.saving{background:var(--warn)}.toast{position:fixed;left:50%;bottom:42px;transform:translateX(-50%);background:#202633;color:#fff;border-radius:8px;padding:9px 18px;font-size:13px;opacity:0;pointer-events:none;transition:opacity .18s}.toast.show{opacity:1}
@media(max-width:900px){.main{flex-direction:column}.left,.right{flex:1;min-width:0}.right{border-top:1px solid var(--line)}.conn{margin-left:0;width:100%;justify-content:space-between}}
.auth-area{margin-left:auto;display:flex;align-items:center;gap:8px}.user-info{display:flex;align-items:center;gap:6px}.user-info.hidden{display:none}.avatar{width:28px;height:28px;border-radius:50%}
.modal.hidden{display:none}.modal{position:fixed;z-index:2000;inset:0;display:flex;align-items:center;justify-content:center}.modal-overlay{position:absolute;inset:0;background:rgba(0,0,0,.45)}.modal-box{position:relative;background:var(--surface);border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,.25);width:520px;max-width:90vw;max-height:80vh;display:flex;flex-direction:column}.modal-head{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid var(--line)}.modal-head h3{margin:0;font-size:15px}.drive-file-list{flex:1;overflow:auto;padding:10px}.drive-file-item{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:8px;cursor:pointer;border:1px solid transparent}.drive-file-item:hover{background:#eef4ff;border-color:var(--brand)}.drive-file-item .small{margin-left:auto;color:var(--muted)}.modal-foot{padding:10px 18px;border-top:1px solid var(--line);text-align:center}
</style>
</head>
<body>
<div class="topbar">
  <button id="backBtn" class="btn sec hidden">← 返回表格列表</button>
  <div class="logo">翻译协作工作台</div>
  <input id="userName" class="name" placeholder="你的名字" autocomplete="off">
  <button id="saveBtn" class="btn hidden">保存到服务器</button>
  <button id="downloadBtn" class="btn sec hidden">下载当前表格</button>
  <button id="uploadBtn" class="btn sec">上传表格</button>
  <button id="exportBtn" class="btn sec hidden">导出终稿 txt</button>
  <button id="reconnectBtn" class="btn sec">重新连接</button>
  <input id="uploadInput" type="file" accept=".xlsx,.xls" hidden>
  <div id="authArea" class="auth-area">
    <a id="loginBtn" class="btn" href="/auth/google">🔵 登录 Google</a>
    <div id="userInfo" class="user-info hidden">
      <img id="userAvatar" class="avatar" src="" alt="">
      <span id="userDisplayName"></span>
      <a id="logoutBtn" class="btn sec" href="/auth/logout">登出</a>
    </div>
  </div>
  <div class="conn">
    <span id="connDot" class="dot"></span>
    <span id="connText" class="mode">未连接</span>
    <span id="onlineText" class="small">0 人在线</span>
  </div>
</div>

<section id="libraryScreen" class="screen library">
  <div class="library-head">
    <div>
      <div class="library-title">表格列表</div>
      <div class="library-sub">像文件夹一样管理协作表格。点击文件夹进入，点击表格进入工作台。</div>
    </div>
    <div class="library-actions">
      <button id="upFolderBtn" class="btn sec">上一级</button>
      <button id="newFolderBtn" class="btn sec">新建文件夹</button>
      <button id="refreshListBtn" class="btn sec">刷新</button>
      <button id="driveOpenBtn" class="btn sec hidden">📂 从 Google Drive 打开</button>
    </div>
    <div id="crumbs" class="crumbs">当前位置：根目录</div>
  </div>
  <div id="fileList" class="file-list"><div class="empty">正在加载表格列表...</div></div>
</section>

<section id="workspaceScreen" class="screen hidden">
  <div id="chapters" class="chapters"><span class="small">请选择表格</span></div>
  <div class="main">
    <section class="left">
      <div class="tools"><input id="searchInput" placeholder="搜索序号、韩文、译文..." autocomplete="off"><button id="boldBtn" class="mini">B</button><button id="italicBtn" class="mini">I</button><button id="underlineBtn" class="mini">U</button><button id="strikeBtn" class="mini">S</button><select id="fontSizeSel" class="mini"><option value="">字号</option><option>12</option><option>14</option><option>16</option><option>18</option><option>20</option></select><input id="fontColorInput" type="color" title="文字颜色"><input id="fillColorInput" type="color" title="填充颜色"><button id="alignLeftBtn" class="mini">左</button><button id="alignCenterBtn" class="mini">中</button><button id="alignRightBtn" class="mini">右</button><button id="wrapBtn" class="mini">换行</button><button id="clearStyleBtn" class="mini">清格式</button><button id="insertRowBtn" class="mini">插入行</button><button id="duplicateRowBtn" class="mini">复制行</button><button id="deleteRowBtn" class="mini">删除行</button><span id="searchCount" class="small"></span></div>
      <div class="table-wrap"><table id="dataTable" hidden><thead id="thead"></thead><tbody id="tbody"></tbody></table><div id="tableEmpty" class="empty">等待服务器返回数据</div></div>
    </section>
    <section class="right">
      <div class="preview-head"><span>终稿预览 <span id="previewCount"></span></span><div class="preview-actions"><button id="copyBtn" class="mini">复制</button><button id="refreshBtn" class="mini">刷新</button></div></div>
      <div id="preview" class="preview"><div class="empty">加载后将在这里显示终稿</div></div>
    </section>
  </div>
</section>

<div class="statusbar">
  <span><span id="saveDot" class="save-dot"></span> <span id="saveText">未修改</span></span>
  <span id="stats"></span>
  <span id="sheetInfo"></span>
</div>
<div id="contextMenu" class="ctx hidden"></div>
<div id="toast" class="toast"></div>

<!-- Google Drive 文件选择器模态框 -->
<div id="driveModal" class="modal hidden">
  <div class="modal-overlay"></div>
  <div class="modal-box">
    <div class="modal-head">
      <h3>📂 从 Google Drive 选择文件</h3>
      <button id="driveModalClose" class="mini">✕</button>
    </div>
    <div id="driveFileList" class="drive-file-list">
      <div class="empty">加载中...</div>
    </div>
    <div class="modal-foot small">
      包含你的文件 + 别人共享给你的文件。双击打开。
    </div>
  </div>
</div>

<script>
(function(){
  "use strict";
  var state={sheets:{},sheetNames:[],currentSheet:""};
  var currentWorkbook=null,workbooks=[],currentFolder="",selectedRow=0,selectedCell=null,ws=null,wsTimer=null,pollTimer=null,reconnectTimer=null,autoSaveTimer=null,statusTimer=null,mode="offline",dirty=false,search="",previewMap=[];
  var els={};
  ["backBtn","libraryScreen","workspaceScreen","fileList","upFolderBtn","newFolderBtn","refreshListBtn","crumbs","userName","saveBtn","downloadBtn","uploadBtn","uploadInput","exportBtn","reconnectBtn","connDot","connText","onlineText","chapters","searchInput","boldBtn","italicBtn","underlineBtn","strikeBtn","fontSizeSel","fontColorInput","fillColorInput","alignLeftBtn","alignCenterBtn","alignRightBtn","wrapBtn","clearStyleBtn","insertRowBtn","duplicateRowBtn","deleteRowBtn","searchCount","dataTable","tableEmpty","thead","tbody","preview","previewCount","copyBtn","refreshBtn","saveDot","saveText","stats","sheetInfo","contextMenu","toast"].forEach(function(id){els[id]=document.getElementById(id)});

  function toast(msg){els.toast.textContent=msg;els.toast.classList.add("show");clearTimeout(toast.t);toast.t=setTimeout(function(){els.toast.classList.remove("show")},2400)}
  function esc(v){return String(v==null?"":v).replace(/[&<>]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;"}[c]})}
  function fmtTime(s){if(!s)return "";var d=new Date(s);return isNaN(d)?"":d.toLocaleString()}
  function current(){return state.sheets[state.currentSheet]||{headers:[],rows:[]}}
  function finalText(row){var c=row.content||[];for(var i=c.length-1;i>=0;i--){if(String(c[i]||"").trim())return String(c[i]).trim()}return ""}
  function ensureStyles(row){if(!row.styles)row.styles={};if(!row.styles.seq)row.styles.seq={};if(!row.styles.kr)row.styles.kr={};if(!Array.isArray(row.styles.content))row.styles.content=[];while(row.styles.content.length<current().headers.length)row.styles.content.push({});return row.styles}
  function getStyle(row,field,col){var s=ensureStyles(row);if(field==="seq")return s.seq;if(field==="kr")return s.kr;return s.content[col]||(s.content[col]={})}
  function styleCss(style){var out=[];if(style.bold)out.push("font-weight:700");if(style.italic)out.push("font-style:italic");if(style.underline||style.strike){var dec=[];if(style.underline)dec.push("underline");if(style.strike)dec.push("line-through");out.push("text-decoration:"+dec.join(" "))}if(style.fontColor)out.push("color:"+style.fontColor);if(style.fillColor)out.push("background-color:"+style.fillColor);if(style.align)out.push("text-align:"+style.align);if(style.fontSize)out.push("font-size:"+style.fontSize+"px");if(style.wrap===false)out.push("white-space:nowrap");return out.join(";")}
  function styleAttr(style){var css=styleCss(style||{});return css?' style="'+esc(css)+'"':""}
  function setDirty(v){dirty=v;els.saveDot.className="save-dot"+(v?" dirty":"");els.saveText.textContent=v?"有未保存修改":"已保存"}
  function setConn(next,text){mode=next;els.connDot.className="dot "+(next==="ws"?"ok":next==="poll"?"warn":next==="error"?"bad":"");els.connText.textContent=text}
  function postJson(url,payload){return fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload||{})}).then(function(r){if(!r.ok)throw new Error(r.status);return r.json()})}

  function showLibrary(){currentWorkbook=null;els.libraryScreen.classList.remove("hidden");els.workspaceScreen.classList.add("hidden");els.backBtn.classList.add("hidden");els.saveBtn.classList.add("hidden");els.downloadBtn.classList.add("hidden");els.exportBtn.classList.add("hidden");els.stats.textContent="";els.sheetInfo.textContent="";loadItems()}
  function showWorkspace(){els.libraryScreen.classList.add("hidden");els.workspaceScreen.classList.remove("hidden");els.backBtn.classList.remove("hidden");els.saveBtn.classList.remove("hidden");els.downloadBtn.classList.remove("hidden");els.exportBtn.classList.remove("hidden")}

  function folderLabel(){return currentFolder?("根目录 / "+currentFolder):"根目录"}
  function renderItems(data){
    workbooks=data.files||[];
    els.crumbs.textContent="当前位置："+folderLabel();
    els.upFolderBtn.disabled=!currentFolder;
    var rows=[];
    (data.folders||[]).forEach(function(f){rows.push("<tr class='file-row' draggable='true' data-type='folder' data-path='"+esc(f.path)+"'><td><div class='folder-name'>📁 "+esc(f.name)+"</div><div class='small'>可拖动；也可把表格拖进此文件夹</div></td><td>-</td><td>-</td><td>"+esc(fmtTime(f.updatedAt))+"</td><td class='small'>右键菜单</td></tr>")});
    workbooks.forEach(function(w){rows.push("<tr class='file-row' draggable='true' data-type='file' data-id='"+esc(w.id)+"'><td><div class='file-name'>📄 "+esc(w.name)+"</div><div class='small'>ID: "+esc(w.id)+"，可拖动到文件夹</div></td><td>"+w.sheetCount+" 个 sheet / "+w.rowCount+" 行</td><td>"+w.translated+"/"+w.rowCount+"</td><td>"+esc(fmtTime(w.updatedAt))+"</td><td class='small'>双击/点击编辑</td></tr>")});
    if(!rows.length){els.fileList.innerHTML='<div class="empty">这个文件夹是空的。可以新建文件夹，或点击顶部“上传表格”。</div>';return}
    els.fileList.innerHTML='<table class="file-table"><thead><tr><th>名称</th><th>章节/行数</th><th>翻译进度</th><th>更新时间</th><th>操作</th></tr></thead><tbody>'+rows.join("")+'</tbody></table>';
  }
  function loadItems(){fetch("/api/items?folder="+encodeURIComponent(currentFolder)).then(function(r){return r.json()}).then(renderItems).catch(function(){els.fileList.innerHTML='<div class="empty">列表加载失败</div>'})}
  function loadWorkbooks(){loadItems()}

  function normalize(inState){var sheets=inState&&inState.sheets?inState.sheets:{};state.sheets={};state.sheetNames=(inState.sheetNames&&inState.sheetNames.length?inState.sheetNames:Object.keys(sheets));state.sheetNames.forEach(function(sn){var src=sheets[sn]||{};state.sheets[sn]={headers:(src.headers||[]).map(function(h){return typeof h==="string"?{name:h}:h}),rows:(src.rows||[]).map(function(r){return {seq:String(r.seq||""),kr:String(r.kr||""),content:(r.content||[]).map(function(x){return String(x||"")}),merge:!!r.merge}})}});state.currentSheet=inState.currentSheet&&state.sheets[inState.currentSheet]?inState.currentSheet:(state.sheetNames[0]||"")}
  function applyState(workbook,inState){currentWorkbook=workbook||currentWorkbook;normalize(inState);showWorkspace();renderAll();setDirty(false);if(currentWorkbook)els.sheetInfo.textContent=currentWorkbook.name}
  function openWorkbook(id){var known=workbooks.find(function(w){return w.id===id});currentWorkbook=known||{id:id,name:id};if(sendWS({type:"open",workbookId:id}))return;postJson("/api/data/"+encodeURIComponent(id),{}).then(function(data){applyState(data.workbook,data.state)}).catch(function(){toast("打开表格失败")})}

  function connect(){clearTimeout(wsTimer);clearTimeout(reconnectTimer);stopPolling();if(ws){try{ws.close()}catch(e){}}setConn("offline","连接中...");wsTimer=setTimeout(function(){if(!ws||ws.readyState!==1){try{ws&&ws.close()}catch(e){};startPolling("WebSocket 超时，已切换轮询")}},8000);try{ws=new WebSocket((location.protocol==="https:"?"wss://":"ws://")+location.host+"/ws");ws.onopen=function(){clearTimeout(wsTimer);setConn("ws","WebSocket 已连接");if(els.userName.value.trim())sendWS({type:"setName",name:els.userName.value.trim()});if(currentWorkbook)sendWS({type:"open",workbookId:currentWorkbook.id})};ws.onmessage=function(ev){handleMessage(JSON.parse(ev.data))};ws.onerror=function(){setConn("error","WebSocket 失败")};ws.onclose=function(){clearTimeout(wsTimer);if(mode==="ws"){setConn("offline","已断线，重连中...");reconnectTimer=setTimeout(connect,3000)}else if(mode!=="poll"){startPolling("WebSocket 不可用，已切换轮询")}}}catch(e){startPolling("WebSocket 不可用，已切换轮询")}}
  function checkAuth(){console.log("checkAuth running");fetch("/api/user").then(function(r){return r.json()}).then(function(data){console.log("auth data:",data);if(data.loggedIn){var lb=document.getElementById("loginBtn");if(lb){lb.style.display="none";console.log("hide loginBtn")}var ui=document.getElementById("userInfo");if(ui){ui.style.display="flex";document.getElementById("userDisplayName").textContent=data.user.displayName;document.getElementById("userAvatar").src=data.user.avatar;console.log("show userInfo")}var dob=document.getElementById("driveOpenBtn");if(dob){dob.style.display="inline-block";console.log("show driveOpenBtn")}}}).catch(function(e){console.log("checkAuth err:",e)})}
  function sendWS(msg){if(ws&&ws.readyState===1){ws.send(JSON.stringify(msg));return true}return false}
  function handleMessage(msg){if(msg.type==="workbookList"){if(!currentWorkbook)loadItems();return}if(msg.type==="userCount"){els.onlineText.textContent=msg.count+" 人在线";return}if(msg.type==="init"){applyState(msg.workbook,msg.state);return}if(msg.type==="saved"){setDirty(false);toast("服务器已保存 "+(msg.time||""));return}if(msg.type==="edit"){var a=state.sheets[msg.sheet];if(a&&a.rows[msg.row]){if(msg.field==="seq")a.rows[msg.row].seq=String(msg.value||"");else if(msg.field==="kr")a.rows[msg.row].kr=String(msg.value||"");else a.rows[msg.row].content[msg.col]=String(msg.value||"");if(msg.sheet===state.currentSheet)renderAll(true)}return}if(msg.type==="style"){applyStyleLocal(msg);renderAll(true);return}if(msg.type==="merge"){var b=state.sheets[msg.sheet];if(b&&b.rows[msg.row]){b.rows[msg.row].merge=!!msg.value;if(msg.sheet===state.currentSheet)renderAll(true)}return}if(msg.type==="row"){applyRowLocal(msg.action,msg.row);renderAll(true);return}if(msg.type==="switchSheet"&&state.sheets[msg.sheet]){state.currentSheet=msg.sheet;renderAll(true)}}

  document.getElementById("driveFileList").addEventListener("dblclick",function(e){var item=e.target.closest(".drive-file-item");if(!item)return;if(item.dataset.isfolder==="true"){toast("文件夹暂不支持");return}document.getElementById("driveModal").classList.add("hidden");openDriveFile(item.dataset.id,item.dataset.name)});
  function openDriveFile(fileId,name){els.uploadBtn.disabled=true;fetch("/api/drive/open/"+encodeURIComponent(fileId)+"?name="+encodeURIComponent(name),{method:"POST"}).then(function(r){return r.json()}).then(function(data){if(!data.ok){toast("打开失败: "+(data.error||""));return}applyState(data.workbook,data.state);toast("已从 Google Drive 打开: "+name)}).catch(function(){toast("打开 Drive 文件失败")}).finally(function(){els.uploadBtn.disabled=false})}
  setInterval(function(){if(dirty)saveServer()},300000);
  statusTimer=setInterval(refreshOnline,3000);refreshOnline();
  connect();showLibrary();checkAuth();
})();
</script>
</body>
</html>

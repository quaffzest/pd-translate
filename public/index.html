<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>翻译协作工作台</title>
<style>
:root{--bg:#f4f6f8;--surface:#fff;--line:#d8dde5;--text:#172033;--muted:#667085;--brand:#315efb;--brand2:#244bd6;--ok:#16803c;--warn:#d98200;--bad:#d92d20;--kr:#f7f8fa;--edit:#eef4ff;--review:#fff9df;--final:#f5f1ff;--active:#fff3bf}
*{box-sizing:border-box}body{margin:0;height:100vh;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif}button,input,select{font:inherit}
.topbar{display:flex;gap:10px;align-items:center;padding:10px 14px;background:var(--surface);border-bottom:1px solid var(--line);flex-wrap:wrap}.logo{font-weight:800;color:var(--brand);white-space:nowrap}.name{width:130px;border:1px solid var(--line);border-radius:6px;padding:7px 9px}.btn{border:0;border-radius:6px;background:var(--brand);color:#fff;padding:8px 12px;cursor:pointer;white-space:nowrap;text-decoration:none;display:inline-block}.btn:hover{background:var(--brand2)}.btn.sec{background:#eef0f4;color:#253044}.btn.sec:hover{background:#dde2ea}.btn:disabled{opacity:.55;cursor:not-allowed}.conn{margin-left:auto;display:flex;align-items:center;gap:10px;padding:7px 10px;border:1px solid var(--line);border-radius:8px;background:#fafbfc;font-size:13px}.dot{width:9px;height:9px;border-radius:50%;background:#98a2b3}.dot.ok{background:var(--ok)}.dot.warn{background:var(--warn)}.dot.bad{background:var(--bad)}.mode{font-weight:700}.small{font-size:12px;color:var(--muted)}.auth-area{display:flex;align-items:center;gap:8px}.user-info{display:flex;align-items:center;gap:6px}.avatar{width:28px;height:28px;border-radius:50%}
.screen{flex:1;min-height:0;overflow:hidden}.hidden{display:none!important}.library{height:100%;display:flex;flex-direction:column}.library-head{padding:14px 22px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#fff 0%,#fbfcff 100%)}.library-title{font-size:20px;font-weight:800}.library-sub{color:var(--muted);font-size:13px;margin-top:2px}.summary-cards{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-top:12px}.summary-card{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:12px 14px;min-height:76px;box-shadow:0 8px 20px rgba(16,24,40,.04)}.summary-card .label{font-size:12px;color:var(--muted);margin-bottom:6px}.summary-card .value{font-size:16px;font-weight:800;color:#1d2939;line-height:1.3}.summary-card .hint{margin-top:4px;font-size:12px;color:var(--muted)}.tabs{display:flex;gap:6px;margin-top:12px}.tabbtn{border:0;border-bottom:2px solid transparent;background:transparent;padding:8px 12px;color:var(--muted);cursor:pointer}.tabbtn.active{color:var(--brand);font-weight:800;border-bottom-color:var(--brand)}.toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:12px}.toolbar input{border:1px solid var(--line);border-radius:6px;padding:8px 10px;min-width:240px}.crumbs{margin-top:10px;font-size:13px;color:var(--muted)}.file-list{flex:1;overflow:auto;padding:18px 22px}.file-table{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--line);border-radius:8px;overflow:hidden}.file-table th{background:#f8fafc;color:var(--muted);font-size:12px;text-align:left;padding:10px;border-bottom:1px solid var(--line)}.file-table td{padding:12px 10px;border-bottom:1px solid #edf0f5}.file-row{cursor:pointer}.file-row:hover{background:#f5f8ff}.file-row.disabled{color:#98a2b3}.file-name{font-weight:800;color:#1d2939}.folder-name{font-weight:800;color:#344054}.empty{height:100%;display:flex;align-items:center;justify-content:center;text-align:center;color:#98a2b3;line-height:1.8;padding:30px}.ctx{position:fixed;z-index:1000;background:#fff;border:1px solid var(--line);border-radius:8px;box-shadow:0 12px 30px rgba(16,24,40,.18);padding:6px;min-width:150px}.ctx button{display:block;width:100%;border:0;background:#fff;text-align:left;padding:8px 10px;border-radius:5px;cursor:pointer}.ctx button:hover{background:#f2f4f7}.ctx .danger{color:var(--bad)}
.chapters{display:flex;gap:4px;align-items:center;min-height:38px;padding:0 14px;background:var(--surface);border-bottom:1px solid var(--line);overflow-x:auto}.sheet-tab{border:0;background:transparent;border-bottom:2px solid transparent;padding:9px 14px;color:var(--muted);cursor:pointer;white-space:nowrap}.sheet-tab.active{color:var(--brand);border-bottom-color:var(--brand);font-weight:700}.chapter-info{margin-left:auto;white-space:nowrap}.main{height:calc(100% - 38px);display:flex;min-height:0}.left{flex:1.55;min-width:0;background:var(--surface);display:flex;flex-direction:column;border-right:1px solid var(--line)}.right{flex:1;min-width:320px;background:#f1f3f6;display:flex;flex-direction:column}.tools{display:flex;gap:8px;align-items:center;padding:7px 10px;border-bottom:1px solid var(--line);overflow-x:auto}.tools input[type=text]{flex:1;min-width:180px;border:1px solid var(--line);border-radius:6px;padding:7px 9px}.table-wrap{flex:1;overflow:auto}table{width:100%;border-collapse:collapse;table-layout:fixed;font-size:13px}th{position:sticky;top:0;z-index:2;background:#f8fafc;color:var(--muted);border-bottom:2px solid var(--line);padding:7px 5px;text-align:left;font-size:12px}td{border:1px solid #e7eaf0;padding:5px;vertical-align:top;line-height:1.55;white-space:pre-wrap;word-break:break-word}.w-merge{width:38px;text-align:center}.w-seq{width:54px;text-align:center}.kr{background:var(--kr);color:#555;font-family:"Malgun Gothic","Apple SD Gothic Neo","Noto Sans KR",sans-serif}.editable{background:var(--edit);outline:none;cursor:text}.editable.review{background:var(--review)}.editable:focus{box-shadow:inset 0 0 0 2px var(--brand);background:#fffde7}.cell-active{box-shadow:inset 0 0 0 2px var(--brand)!important}.merged-cell{background:#f6f8fb;color:#475467}.merged-note{display:inline-block;margin-top:5px;padding:2px 6px;border-radius:999px;background:#eef0f4;color:#667085;font-size:11px}.final{background:var(--final);color:#3f2da8;font-weight:600}.row-active td{background:var(--active)!important}.preview-head{display:flex;justify-content:space-between;gap:10px;align-items:center;padding:10px 14px;border-bottom:1px solid var(--line);font-size:13px;color:var(--muted);background:#fff}.preview-actions{display:flex;gap:6px}.mini{border:1px solid var(--line);border-radius:5px;background:#fff;color:#253044;padding:4px 8px;cursor:pointer;white-space:nowrap}.mini:hover{background:#f1f3f7}.preview{flex:1;overflow:auto;padding:24px 18px}.doc-page{width:min(100%,794px);min-height:1123px;margin:0 auto 22px;background:#fff;box-shadow:0 10px 28px rgba(16,24,40,.16);padding:72px 84px}.para{position:relative;display:flex;gap:10px;margin:0 0 10px;padding:3px 8px;border-radius:4px;line-height:1.75;cursor:pointer;font-family:"Noto Serif SC","Source Han Serif SC",SimSun,serif;color:#111827}.para:hover,.para.active{background:#eaf0ff}.pnum{width:34px;flex:none;color:#9aa4b2;font:12px system-ui;line-height:2.1}.ptext{flex:1;white-space:pre-wrap}.pa{display:flex;gap:3px;opacity:0;position:absolute;right:4px;top:4px}.para:hover .pa{opacity:1}.pa button{width:28px;height:26px;border:1px solid var(--line);border-radius:5px;background:#fff;cursor:pointer}.statusbar{display:flex;gap:18px;align-items:center;padding:6px 14px;border-top:1px solid var(--line);background:var(--surface);font-size:12px;color:var(--muted)}.save-dot{width:8px;height:8px;border-radius:50%;display:inline-block;background:var(--ok)}.save-dot.dirty{background:var(--bad)}.save-dot.saving{background:var(--warn)}.toast{position:fixed;left:50%;bottom:42px;transform:translateX(-50%);background:#202633;color:#fff;border-radius:8px;padding:9px 18px;font-size:13px;opacity:0;pointer-events:none;transition:opacity .18s}.toast.show{opacity:1}
@media(max-width:900px){.main{flex-direction:column}.left,.right{flex:1;min-width:0}.right{border-top:1px solid var(--line)}.conn{margin-left:0;width:100%;justify-content:space-between}}
</style>
</head>
<body>
<div class="topbar">
  <button id="backBtn" class="btn sec hidden">← 返回文件</button>
  <div class="logo">翻译协作工作台</div>
  <input id="userName" class="name" placeholder="你的名字" autocomplete="off">
  <button id="saveBtn" class="btn hidden">保存</button>
  <button id="downloadBtn" class="btn sec hidden">下载当前表格</button>
  <button id="exportBtn" class="btn sec hidden">导出 DOCX</button>
  <button id="reconnectBtn" class="btn sec">重新连接</button>
  <div id="authArea" class="auth-area">
    <a id="loginBtn" class="btn" href="/auth/login?returnTo=/workbench">登录工作台</a>
    <div id="userInfo" class="user-info hidden">
      <img id="userAvatar" class="avatar" src="" alt="">
      <span id="userDisplayName"></span>
      <a id="logoutBtn" class="btn sec" href="/auth/logout?returnTo=/workbench">登出</a>
    </div>
  </div>
  <div class="conn"><span id="connDot" class="dot"></span><span id="connText" class="mode">未连接</span><span id="onlineText" class="small">0 人在线</span></div>
</div>

<section id="libraryScreen" class="screen library">
  <div class="library-head">
    <div class="library-title">文件</div>
    <div class="library-sub">像 Google Drive 一样浏览文件。双击 xlsx/xls/Google 表格进入翻译协作工作台。</div>
    <div class="summary-cards">
      <div class="summary-card">
        <div class="label">当前 Drive</div>
        <div id="driveSummary" class="value">根目录</div>
        <div id="driveSummaryHint" class="hint">等待加载文件</div>
      </div>
      <div class="summary-card">
        <div class="label">工作台文件</div>
        <div id="serverSummary" class="value">0 个</div>
        <div id="serverSummaryHint" class="hint">云端工作台内容</div>
      </div>
      <div class="summary-card">
        <div class="label">当前编辑</div>
        <div id="currentSummary" class="value">未打开</div>
        <div id="currentSummaryHint" class="hint">双击文件进入协作编辑</div>
      </div>
    </div>
    <div class="tabs">
      <button id="driveTab" class="tabbtn active">Google Drive</button>
      <button id="serverTab" class="tabbtn">工作台文件</button>
      <button id="uploadTab" class="tabbtn">本地上传</button>
    </div>
    <div id="driveToolbar" class="toolbar">
      <button id="driveUpBtn" class="btn sec">上一级</button>
      <button id="driveRefreshBtn" class="btn sec">刷新</button>
      <button id="driveNewFolderBtn" class="btn sec">新建文件夹</button>
      <button id="driveUploadBtn" class="btn">上传到当前 Drive 文件夹</button>
      <input id="driveUploadInput" type="file" accept=".xlsx,.xls" hidden>
      <input id="driveSearchInput" placeholder="搜索当前文件夹..." autocomplete="off">
    </div>
    <div id="serverToolbar" class="toolbar hidden">
      <button id="serverUpBtn" class="btn sec">上一级</button>
      <button id="serverRefreshBtn" class="btn sec">刷新</button>
      <button id="serverNewFolderBtn" class="btn sec">新建文件夹</button>
    </div>
    <div id="uploadToolbar" class="toolbar hidden">
      <button id="uploadServerBtn" class="btn sec">上传到工作台</button>
      <button id="uploadDriveBtn" class="btn">上传到当前 Drive 文件夹</button>
      <input id="uploadServerInput" type="file" accept=".xlsx,.xls" hidden>
      <input id="uploadDriveInput" type="file" accept=".xlsx,.xls" hidden>
    </div>
    <div id="crumbs" class="crumbs">Google Drive / 我的云端硬盘</div>
  </div>
  <div id="fileList" class="file-list"><div class="empty">正在加载...</div></div>
</section>

<section id="workspaceScreen" class="screen hidden">
  <div id="chapters" class="chapters"><span class="small">请选择表格</span></div>
  <div class="main">
    <section class="left">
      <div class="tools"><input id="searchInput" type="text" placeholder="搜索序号、韩文、译文..." autocomplete="off"><button id="boldBtn" class="mini">B</button><button id="italicBtn" class="mini">I</button><button id="underlineBtn" class="mini">U</button><button id="strikeBtn" class="mini">S</button><select id="fontSizeSel" class="mini"><option value="">字号</option><option>12</option><option>14</option><option>16</option><option>18</option><option>20</option></select><input id="fontColorInput" type="color" title="文字颜色"><input id="fillColorInput" type="color" title="填充颜色"><button id="alignLeftBtn" class="mini">左</button><button id="alignCenterBtn" class="mini">中</button><button id="alignRightBtn" class="mini">右</button><button id="wrapBtn" class="mini">换行</button><button id="clearStyleBtn" class="mini">清格式</button><button id="insertRowBtn" class="mini">插入行</button><button id="duplicateRowBtn" class="mini">复制行</button><button id="deleteRowBtn" class="mini">删除行</button><span id="searchCount" class="small"></span></div>
      <div class="table-wrap"><table id="dataTable" hidden><thead id="thead"></thead><tbody id="tbody"></tbody></table><div id="tableEmpty" class="empty">等待服务器返回数据</div></div>
    </section>
    <section class="right">
      <div class="preview-head"><span>终稿预览 <span id="previewCount"></span></span><div class="preview-actions"><button id="copyBtn" class="mini">复制</button><button id="refreshBtn" class="mini">刷新</button></div></div>
      <div id="preview" class="preview"><div class="empty">加载后将在这里显示终稿</div></div>
    </section>
  </div>
</section>

<div class="statusbar"><span><span id="saveDot" class="save-dot"></span> <span id="saveText">未修改</span></span><span id="driveSyncText"></span><span id="stats"></span><span id="sheetInfo"></span></div>
<div id="contextMenu" class="ctx hidden"></div>
<div id="toast" class="toast"></div>

<script>
(function(){
  "use strict";
  var DRIVE_FOLDER_MIME="application/vnd.google-apps.folder";
  var GOOGLE_SHEET_MIME="application/vnd.google-apps.spreadsheet";
  var state={sheets:{},sheetNames:[],currentSheet:""};
  var currentWorkbook=null,serverWorkbooks=[],driveItems=[],driveStack=[{id:"root",name:"我的云端硬盘"}],currentServerFolder="",activeTab="drive",selectedRow=0,selectedCell=null,ws=null,wsTimer=null,pollTimer=null,reconnectTimer=null,autoSaveTimer=null,statusTimer=null,mode="offline",dirty=false,search="",previewMap=[];
  var els={};
  ["backBtn","libraryScreen","workspaceScreen","fileList","driveTab","serverTab","uploadTab","driveToolbar","serverToolbar","uploadToolbar","driveUpBtn","driveRefreshBtn","driveNewFolderBtn","driveUploadBtn","driveUploadInput","driveSearchInput","serverUpBtn","serverRefreshBtn","serverNewFolderBtn","uploadServerBtn","uploadDriveBtn","uploadServerInput","uploadDriveInput","crumbs","driveSummary","driveSummaryHint","serverSummary","serverSummaryHint","currentSummary","currentSummaryHint","userName","saveBtn","downloadBtn","exportBtn","reconnectBtn","connDot","connText","onlineText","chapters","searchInput","boldBtn","italicBtn","underlineBtn","strikeBtn","fontSizeSel","fontColorInput","fillColorInput","alignLeftBtn","alignCenterBtn","alignRightBtn","wrapBtn","clearStyleBtn","insertRowBtn","duplicateRowBtn","deleteRowBtn","searchCount","dataTable","tableEmpty","thead","tbody","preview","previewCount","copyBtn","refreshBtn","saveDot","saveText","driveSyncText","stats","sheetInfo","contextMenu","toast","loginBtn","userInfo","userDisplayName","userAvatar"].forEach(function(id){els[id]=document.getElementById(id)});
  function toast(msg){els.toast.textContent=msg;els.toast.classList.add("show");clearTimeout(toast.t);toast.t=setTimeout(function(){els.toast.classList.remove("show")},2400)}
  function esc(v){return String(v==null?"":v).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]})}
  function fmtTime(s){if(!s)return "";var d=new Date(s);return isNaN(d)?"":d.toLocaleString()}
  function current(){return state.sheets[state.currentSheet]||{headers:[],rows:[]}}
  function finalText(row){var c=row.content||[];for(var i=c.length-1;i>=0;i--){if(String(c[i]||"").trim())return String(c[i]).trim()}return ""}
  function finalInfo(row){var c=row.content||[];for(var i=c.length-1;i>=0;i--){if(String(c[i]||"").trim()){var st=row.styles&&row.styles.content&&row.styles.content[i]||{};return {text:String(c[i]).trim(),style:st}}}return {text:"",style:{}}}
  function buildDocumentModel(){var rows=current().rows,paras=[];for(var i=0;i<rows.length;i++){var info=finalInfo(rows[i]);if(!info.text)continue;var p={rows:[i],runs:[{text:info.text,style:info.style||{}}]},j=i+1;while(j<rows.length&&rows[j].merge){var mi=finalInfo(rows[j]);if(mi.text){p.rows.push(j);p.runs.push({text:mi.text,style:mi.style||{}})}j++}paras.push(p)}return {paragraphs:paras,page:{margin:{top:1440,right:1440,bottom:1440,left:1440},paragraph:{line:420,before:0,after:180},font:"SimSun",fontSize:24}}}
  function estimateParagraphBlock(paragraph,page){var defaults=page||{};var pageWidth=794-84*2;var fontSize=Number(defaults.fontSize||24);var lineHeight=Math.max(22,Math.round(fontSize*1.55));var paragraphSpacing=Math.max(10,Math.round((((defaults.paragraph||{}).after)||180)/12));var charsPerLine=Math.max(14,Math.floor(pageWidth/Math.max(7,fontSize*0.55)));var lines=0;(paragraph.runs||[]).forEach(function(run){var text=String(run.text||"");var chunks=text.split(/\n/);chunks.forEach(function(chunk){lines+=Math.max(1,Math.ceil(chunk.length/charsPerLine))})});lines=Math.max(lines,1);return {lines:lines,height:lines*lineHeight+paragraphSpacing}}
  function paginateDocument(paragraphs,page){var pages=[],currentPage=[],used=0,limit=1123-72*2;for(var i=0;i<paragraphs.length;i++){var block=estimateParagraphBlock(paragraphs[i],page);if(currentPage.length&&used+block.height>limit){pages.push(currentPage);currentPage=[];used=0}currentPage.push(paragraphs[i]);used+=block.height}if(currentPage.length)pages.push(currentPage);return pages}
  function ensureStyles(row){if(!row.styles)row.styles={};if(!row.styles.seq)row.styles.seq={};if(!row.styles.kr)row.styles.kr={};if(!Array.isArray(row.styles.content))row.styles.content=[];while(row.styles.content.length<current().headers.length)row.styles.content.push({});return row.styles}
  function getStyle(row,field,col){var s=ensureStyles(row);if(field==="seq")return s.seq;if(field==="kr")return s.kr;return s.content[col]||(s.content[col]={})}
  function styleCss(style){var out=[];if(style.bold)out.push("font-weight:700");if(style.italic)out.push("font-style:italic");if(style.underline||style.strike){var dec=[];if(style.underline)dec.push("underline");if(style.strike)dec.push("line-through");out.push("text-decoration:"+dec.join(" "))}if(style.fontColor)out.push("color:"+style.fontColor);if(style.fillColor)out.push("background-color:"+style.fillColor);if(style.align)out.push("text-align:"+style.align);if(style.fontSize)out.push("font-size:"+style.fontSize+"px");if(style.wrap===false)out.push("white-space:nowrap");return out.join(";")}
  function styleAttr(style){var css=styleCss(style||{});return css?' style="'+esc(css)+'"':""}
  function setDirty(v){dirty=v;els.saveDot.className="save-dot"+(v?" dirty":"");els.saveText.textContent=v?"有未保存修改":"工作台已保存"}
  function setConn(next,text){mode=next;els.connDot.className="dot "+(next==="ws"?"ok":next==="poll"?"warn":next==="error"?"bad":"");els.connText.textContent=text}
  function postJson(url,payload){return fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload||{})}).then(function(r){return r.json().then(function(data){if(!r.ok||data.ok===false)throw new Error(data.error||r.status);return data})})}
  function isSpreadsheet(item){return item&&item.isSpreadsheet}
  function iconFor(item){if(item.isFolder)return "📁";if(item.mimeType===GOOGLE_SHEET_MIME)return "🟩";if(isSpreadsheet(item))return "📄";return "📎"}
  function setTab(tab){activeTab=tab;["drive","server","upload"].forEach(function(t){els[t+"Tab"].classList.toggle("active",t===tab);els[t+"Toolbar"].classList.toggle("hidden",t!==tab)});hideContext();if(tab==="drive")loadDriveItems();else if(tab==="server")loadServerItems();else renderUploadHelp();refreshLibrarySummary()}
  function currentDriveFolder(){return driveStack[driveStack.length-1]}
  function showLibrary(){if(currentWorkbook)sendWS({type:"leave"});currentWorkbook=null;els.libraryScreen.classList.remove("hidden");els.workspaceScreen.classList.add("hidden");els.backBtn.classList.add("hidden");els.saveBtn.classList.add("hidden");els.downloadBtn.classList.add("hidden");els.exportBtn.classList.add("hidden");els.stats.textContent="";els.sheetInfo.textContent="";els.driveSyncText.textContent="";if(activeTab==="drive")loadDriveItems();else if(activeTab==="server")loadServerItems();else renderUploadHelp();refreshLibrarySummary()}
  function showWorkspace(){els.libraryScreen.classList.add("hidden");els.workspaceScreen.classList.remove("hidden");els.backBtn.classList.remove("hidden");els.saveBtn.classList.remove("hidden");els.downloadBtn.classList.remove("hidden");els.exportBtn.classList.remove("hidden");refreshLibrarySummary()}

  function hideContext(){els.contextMenu.classList.add("hidden");els.contextMenu.innerHTML=""}
  function showDriveContext(x,y,item){els.contextMenu.innerHTML="<button data-act='open'>"+(item.isFolder?"打开文件夹":"打开")+"</button><button data-act='rename'>重命名</button><button data-act='move'>移动到...</button><button data-act='props'>属性</button><button class='danger' data-act='trash'>移到垃圾箱</button>";els.contextMenu.style.left=x+"px";els.contextMenu.style.top=y+"px";els.contextMenu.classList.remove("hidden");els.contextMenu.onclick=function(ev){var act=ev.target.dataset.act;if(!act)return;hideContext();if(act==="open")openDriveItem(item);else if(act==="rename")renameDriveItem(item);else if(act==="move")moveDriveItem(item);else if(act==="trash")trashDriveItem(item);else if(act==="props")alert(["名称: "+item.name,"ID: "+item.id,"类型: "+item.mimeType,"更新时间: "+fmtTime(item.modifiedTime)].join("\n"))}}
  function showServerContext(x,y,tr){var type=tr.dataset.source,id=tr.dataset.id,path=tr.dataset.path,name=(tr.querySelector(".file-name,.folder-name")||{}).textContent||"";name=name.replace(/^📁 |^📄 /,"");els.contextMenu.innerHTML="<button data-act='open'>打开</button><button data-act='rename'>重命名</button><button data-act='move'>移动到...</button><button class='danger' data-act='delete'>删除</button>";els.contextMenu.style.left=x+"px";els.contextMenu.style.top=y+"px";els.contextMenu.classList.remove("hidden");els.contextMenu.onclick=function(ev){var act=ev.target.dataset.act;if(!act)return;hideContext();if(type==="server-folder"){if(act==="open"){currentServerFolder=path;loadServerItems()}else toast("请在旧工作台文件管理中处理文件夹");return}if(act==="open")openWorkbook(id);else if(act==="rename"){var nn=prompt("新名称",name);if(nn)postJson("/api/rename",{type:"file",id:id,name:nn}).then(loadServerItems)}else if(act==="move"){var target=prompt("移动到哪个工作台文件夹？留空为根目录。","");if(target!==null)postJson("/api/move",{type:"file",id:id,target:target}).then(loadServerItems)}else if(act==="delete"){if(confirm("确定删除“"+name+"”？"))postJson("/api/delete",{type:"file",id:id}).then(loadServerItems)}}}
  function refreshOnline(){fetch("/api/status").then(function(r){return r.json()}).then(function(s){els.onlineText.textContent=(s.clients||0)+" 人在线"}).catch(function(){})}
  els.driveTab.onclick=function(){setTab("drive")};els.serverTab.onclick=function(){setTab("server")};els.uploadTab.onclick=function(){setTab("upload")};els.backBtn.onclick=showLibrary;els.driveUpBtn.onclick=function(){if(driveStack.length>1){driveStack.pop();loadDriveItems()}};els.driveRefreshBtn.onclick=loadDriveItems;els.driveNewFolderBtn.onclick=createDriveFolder;els.driveUploadBtn.onclick=function(){els.driveUploadInput.click()};els.driveUploadInput.onchange=function(){uploadToDrive(this.files[0])};els.driveSearchInput.oninput=renderDriveItems;els.serverUpBtn.onclick=goServerUp;els.serverRefreshBtn.onclick=loadServerItems;els.serverNewFolderBtn.onclick=createServerFolder;els.uploadServerBtn.onclick=function(){els.uploadServerInput.click()};els.uploadDriveBtn.onclick=function(){els.uploadDriveInput.click()};els.uploadServerInput.onchange=function(){uploadToServer(this.files[0])};els.uploadDriveInput.onchange=function(){uploadToDrive(this.files[0])};els.saveBtn.onclick=saveServer;els.downloadBtn.onclick=function(){if(currentWorkbook&&currentWorkbook.source!=="drive")location.href="/api/download/"+encodeURIComponent(currentWorkbook.id);else toast("Drive 文件请在 Google Drive 中下载")};els.exportBtn.onclick=exportDocx;els.reconnectBtn.onclick=connect;els.insertRowBtn.onclick=function(){sendRowOp("insert")};els.duplicateRowBtn.onclick=function(){sendRowOp("duplicate")};els.deleteRowBtn.onclick=function(){if(confirm("删除当前选中行？"))sendRowOp("delete")};els.refreshBtn.onclick=function(){renderPreview();toast("预览已刷新")};els.copyBtn.onclick=function(){navigator.clipboard.writeText(mergedPreview().join("\n\n")).then(function(){toast("已复制终稿")}).catch(function(){toast("复制失败")})};els.userName.onchange=function(){var n=this.value.trim();if(n)sendWS({type:"setName",name:n})};
  els.fileList.addEventListener("dblclick",function(e){var tr=e.target.closest(".file-row");if(!tr)return;if(tr.dataset.source==="drive"){var item=driveItems.find(function(x){return x.id===tr.dataset.id});if(item)openDriveItem(item)}else if(tr.dataset.source==="server-folder"){currentServerFolder=tr.dataset.path||"";loadServerItems()}else if(tr.dataset.source==="server"){openWorkbook(tr.dataset.id)}});
  els.fileList.addEventListener("contextmenu",function(e){var tr=e.target.closest(".file-row");if(!tr)return;e.preventDefault();if(tr.dataset.source==="drive"){var item=driveItems.find(function(x){return x.id===tr.dataset.id});if(item)showDriveContext(e.clientX,e.clientY,item)}else showServerContext(e.clientX,e.clientY,tr)});
  document.addEventListener("click",function(e){if(!e.target.closest("#contextMenu"))hideContext()});
  els.boldBtn.onclick=function(){sendStyle({bold:true})};els.italicBtn.onclick=function(){sendStyle({italic:true})};els.underlineBtn.onclick=function(){sendStyle({underline:true})};els.strikeBtn.onclick=function(){sendStyle({strike:true})};els.fontSizeSel.onchange=function(){if(this.value)sendStyle({fontSize:this.value})};els.fontColorInput.onchange=function(){sendStyle({fontColor:this.value})};els.fillColorInput.onchange=function(){sendStyle({fillColor:this.value})};els.alignLeftBtn.onclick=function(){sendStyle({align:"left"})};els.alignCenterBtn.onclick=function(){sendStyle({align:"center"})};els.alignRightBtn.onclick=function(){sendStyle({align:"right"})};els.wrapBtn.onclick=function(){sendStyle({wrap:false})};els.clearStyleBtn.onclick=function(){sendStyle({bold:false,italic:false,underline:false,strike:false,fontSize:"",fontColor:"",fillColor:"",align:"",wrap:""})};
  els.tbody.addEventListener("input",function(e){var td=e.target.closest("[contenteditable]");if(!td)return;selectCell(td);var row=Number(td.parentNode.dataset.row),col=Number(td.dataset.col),field=td.dataset.field,v=td.textContent,group=(td.dataset.group||String(row)).split(",").map(Number);if(group.length>1){var parts=v.split(/\n/);group.forEach(function(ri,idx){var val=idx<parts.length?parts[idx]:(idx===0?v:"");if(field==="seq"){current().rows[ri].seq=val;sendFieldEdit(ri,"seq",val)}else if(field==="kr"){current().rows[ri].kr=val;sendFieldEdit(ri,"kr",val)}else{current().rows[ri].content[col]=val;sendEdit(ri,col,val)}})}else if(field==="seq"){current().rows[row].seq=v;sendFieldEdit(row,"seq",v)}else if(field==="kr"){current().rows[row].kr=v;sendFieldEdit(row,"kr",v)}else{current().rows[row].content[col]=v;td.parentNode.querySelector(".final").textContent=finalText(current().rows[row]);sendEdit(row,col,v)}renderPreview();renderStats()});
  els.tbody.addEventListener("change",function(e){if(e.target.type!=="checkbox")return;var row=Number(e.target.closest("tr").dataset.row);current().rows[row].merge=e.target.checked;renderAll(true);sendMerge(row,e.target.checked)});
  els.tbody.addEventListener("click",function(e){if(e.target.closest("input"))return;var td=e.target.closest("td[contenteditable]");if(td)selectCell(td);var tr=e.target.closest("tr");if(tr){var row=Number(tr.dataset.row);highlightRow(row);highlightPara(row)}});
  els.preview.addEventListener("click",function(e){var para=e.target.closest(".para");if(!para)return;var i=Number(para.dataset.i),act=e.target.dataset.act;if(act==="merge"){(previewMap[i+1]||[]).forEach(function(row){current().rows[row].merge=true;sendMerge(row,true)});renderAll(true);return}if(act==="split"){(previewMap[i]||[]).slice(1).forEach(function(row){current().rows[row].merge=false;sendMerge(row,false)});renderAll(true);return}var row=(previewMap[i]||[])[0];highlightRow(row);highlightPara(row)});
  els.searchInput.oninput=function(){search=this.value.trim();renderTable();renderPreview();locateSearch()};document.addEventListener("keydown",function(e){if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==="s"){e.preventDefault();saveServer()}});
  setInterval(function(){if(dirty)saveServer()},300000);statusTimer=setInterval(refreshOnline,3000);refreshOnline();connect();checkAuth();setTab("drive");
})();
